<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TVS Email Search</title>
  <style>
    :root {
      /* Solar Dark Theme */
      --primary: #00d4ff;
      --secondary: #eaeaea;
      --accent: #ffcc00;
      --success: #00ff88;
      --warning: #ffcc00;
      --error: #ff4444;
      --muted: #888888;
      --background: #1a1a2e;
      --foreground: #eaeaea;
      --border: #444466;
      --card-bg: #232342;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'SF Mono', 'Monaco', 'Inconsolata', 'Fira Code', monospace;
      background: var(--background);
      color: var(--foreground);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    /* TVS Card Component */
    .tvs-card {
      border: 1px solid var(--border);
      border-radius: 0;
      margin-bottom: 16px;
      background: var(--card-bg);
    }

    .tvs-card-header {
      background: var(--border);
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .tvs-card-title {
      color: var(--primary);
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .tvs-card-body {
      padding: 16px;
    }

    /* TVS Header */
    .tvs-header {
      text-align: center;
      padding: 20px 0;
      margin-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .tvs-header h1 {
      color: var(--primary);
      font-size: 24px;
      letter-spacing: 2px;
    }

    .tvs-header .version {
      color: var(--muted);
      font-size: 12px;
      margin-top: 8px;
    }

    /* Search Box */
    .search-box {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .search-input {
      flex: 1;
      padding: 12px 16px;
      background: var(--background);
      border: 1px solid var(--border);
      color: var(--foreground);
      font-family: inherit;
      font-size: 14px;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .search-btn {
      padding: 12px 24px;
      background: var(--primary);
      color: var(--background);
      border: none;
      font-family: inherit;
      font-weight: bold;
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .search-btn:hover {
      background: #00b8e0;
    }

    .search-btn:disabled {
      background: var(--muted);
      cursor: not-allowed;
    }

    /* KV Component */
    .tvs-kv {
      display: grid;
      grid-template-columns: 120px 1fr;
      gap: 8px 16px;
    }

    .tvs-kv-key {
      color: var(--muted);
    }

    .tvs-kv-value {
      color: var(--foreground);
    }

    .tvs-kv-value.highlight {
      color: var(--primary);
    }

    /* Table Component */
    .tvs-table {
      width: 100%;
      border-collapse: collapse;
    }

    .tvs-table th,
    .tvs-table td {
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .tvs-table th {
      color: var(--primary);
      font-weight: bold;
      text-transform: uppercase;
      font-size: 12px;
      letter-spacing: 1px;
    }

    .tvs-table tr:hover {
      background: rgba(0, 212, 255, 0.05);
    }

    /* Email Card */
    .email-card {
      margin-bottom: 16px;
    }

    .email-meta {
      display: flex;
      gap: 20px;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px dashed var(--border);
    }

    .email-meta-item {
      display: flex;
      gap: 8px;
    }

    .email-meta-label {
      color: var(--muted);
    }

    .email-meta-value {
      color: var(--foreground);
    }

    .email-summary {
      line-height: 1.6;
    }

    .email-summary h4 {
      color: var(--accent);
      margin: 12px 0 8px 0;
      font-size: 13px;
    }

    .email-summary ul {
      list-style: none;
      padding-left: 0;
    }

    .email-summary li {
      padding: 4px 0;
      padding-left: 16px;
      position: relative;
    }

    .email-summary li::before {
      content: '•';
      color: var(--primary);
      position: absolute;
      left: 0;
    }

    /* Progress/Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: var(--muted);
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Sparkline */
    .sparkline {
      color: var(--primary);
      font-size: 16px;
      letter-spacing: 2px;
    }

    /* Footer Watermark */
    .tvs-watermark {
      text-align: right;
      padding: 16px;
      color: var(--muted);
      font-size: 11px;
      border-top: 1px solid var(--border);
      margin-top: 20px;
    }

    .tvs-watermark .theme {
      color: var(--primary);
    }

    /* Status Badge */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      font-size: 11px;
      border-radius: 2px;
      text-transform: uppercase;
    }

    .badge-success {
      background: rgba(0, 255, 136, 0.2);
      color: var(--success);
    }

    .badge-warning {
      background: rgba(255, 204, 0, 0.2);
      color: var(--warning);
    }

    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 16px;
    }

    /* Grid Layout */
    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (max-width: 768px) {
      .grid-2 {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <div class="tvs-header">
      <h1>TVS EMAIL SEARCH</h1>
      <div class="version">Terminal Visual System v0.3.0</div>
    </div>

    <!-- Search Card -->
    <div class="tvs-card">
      <div class="tvs-card-header">
        <span class="tvs-card-title">Search</span>
      </div>
      <div class="tvs-card-body">
        <div class="search-box">
          <input type="text" id="searchInput" class="search-input" placeholder="Enter keyword (e.g., deepseek, anthropic, openai...)" />
          <button id="searchBtn" class="search-btn">Search</button>
        </div>
        <div class="tvs-kv">
          <span class="tvs-kv-key">Account</span>
          <span class="tvs-kv-value highlight" id="accountName">gmail</span>
          <span class="tvs-kv-key">Max Results</span>
          <span class="tvs-kv-value">Top 3 emails</span>
        </div>
      </div>
    </div>

    <!-- Results Container -->
    <div id="resultsContainer">
      <div class="empty-state">
        <div class="empty-state-icon">📧</div>
        <p>Enter a keyword to search your emails</p>
      </div>
    </div>

    <!-- Watermark -->
    <div class="tvs-watermark">
      <span class="theme">[solar-dark]</span> Powered by TVS v0.3.0
    </div>
  </div>

  <script>
    const API_BASE = 'http://localhost:3847';

    const searchInput = document.getElementById('searchInput');
    const searchBtn = document.getElementById('searchBtn');
    const resultsContainer = document.getElementById('resultsContainer');

    searchBtn.addEventListener('click', () => performSearch());
    searchInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') performSearch();
    });

    async function performSearch() {
      const keyword = searchInput.value.trim();
      if (!keyword) return;

      searchBtn.disabled = true;
      resultsContainer.innerHTML = `
        <div class="loading">
          <span class="loading-spinner"></span>
          Searching for "${keyword}"...
        </div>
      `;

      try {
        const response = await fetch(`${API_BASE}/search?keyword=${encodeURIComponent(keyword)}`);
        const data = await response.json();

        if (data.error) {
          throw new Error(data.error);
        }

        renderResults(data, keyword);
      } catch (error) {
        resultsContainer.innerHTML = `
          <div class="tvs-card">
            <div class="tvs-card-header">
              <span class="tvs-card-title" style="color: var(--error)">Error</span>
            </div>
            <div class="tvs-card-body">
              <p>${error.message}</p>
              <p style="color: var(--muted); margin-top: 10px;">Make sure the server is running: <code>bun run server.ts</code></p>
            </div>
          </div>
        `;
      } finally {
        searchBtn.disabled = false;
      }
    }

    function renderResults(data, keyword) {
      const { total, emails } = data;

      let html = `
        <!-- Stats Card -->
        <div class="tvs-card">
          <div class="tvs-card-header">
            <span class="tvs-card-title">Search Results</span>
            <span class="badge badge-success">${total} found</span>
          </div>
          <div class="tvs-card-body">
            <div class="tvs-kv">
              <span class="tvs-kv-key">Keyword</span>
              <span class="tvs-kv-value highlight">${escapeHtml(keyword)}</span>
              <span class="tvs-kv-key">Total Found</span>
              <span class="tvs-kv-value">${total}</span>
              <span class="tvs-kv-key">Showing</span>
              <span class="tvs-kv-value">Top ${emails.length}</span>
            </div>
          </div>
        </div>

        <!-- Results Table -->
        <div class="tvs-card">
          <div class="tvs-card-header">
            <span class="tvs-card-title">Email List</span>
          </div>
          <div class="tvs-card-body" style="padding: 0;">
            <table class="tvs-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>From</th>
                  <th>Date</th>
                  <th>Subject</th>
                </tr>
              </thead>
              <tbody>
                ${emails.map((email, i) => `
                  <tr>
                    <td>${i + 1}</td>
                    <td>${escapeHtml(email.from?.name || email.from?.addr || 'Unknown')}</td>
                    <td>${formatDate(email.date)}</td>
                    <td>${escapeHtml(truncate(email.subject, 50))}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        </div>
      `;

      // Email Detail Cards
      emails.forEach((email, i) => {
        html += `
          <div class="tvs-card email-card">
            <div class="tvs-card-header">
              <span class="tvs-card-title">Email ${i + 1}: ${escapeHtml(truncate(email.subject, 40))}</span>
            </div>
            <div class="tvs-card-body">
              <div class="email-meta">
                <div class="email-meta-item">
                  <span class="email-meta-label">From</span>
                  <span class="email-meta-value">${escapeHtml(email.from?.name || email.from?.addr || 'Unknown')}</span>
                </div>
                <div class="email-meta-item">
                  <span class="email-meta-label">Date</span>
                  <span class="email-meta-value">${email.date}</span>
                </div>
              </div>
              <div class="email-summary">
                <h4>SUMMARY</h4>
                ${email.summary ? formatSummary(email.summary) : '<p style="color: var(--muted)">Loading summary...</p>'}
              </div>
            </div>
          </div>
        `;
      });

      resultsContainer.innerHTML = html;
    }

    function escapeHtml(text) {
      if (!text) return '';
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function truncate(text, maxLen) {
      if (!text) return '';
      return text.length > maxLen ? text.slice(0, maxLen) + '...' : text;
    }

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const parts = dateStr.split(' ');
      return parts.slice(0, 2).join(' ');
    }

    function formatSummary(summary) {
      if (!summary) return '';
      // Convert markdown-like bullet points to HTML
      const lines = summary.split('\n').filter(l => l.trim());
      let html = '<ul>';
      lines.forEach(line => {
        const cleaned = line.replace(/^[•\-\*]\s*/, '').trim();
        if (cleaned) {
          html += `<li>${escapeHtml(cleaned)}</li>`;
        }
      });
      html += '</ul>';
      return html;
    }
  </script>
</body>
</html>
