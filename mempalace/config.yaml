# Solar MemPalace L3 配置文件

# 目录配置
data_dir: /Users/sihaoli/.solar/mempalace/data
models_dir: /Users/sihaoli/.solar/mempalace/models

# Collection 配置
collection_name: solar_memories

# HNSW 索引参数
hnsw:
  space: cosine
  M: 16
  construction_ef: 200
  search_ef: 100

# Embedding 模型配置
models:
  zh: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  en: sentence-transformers/all-MiniLM-L6-v2
  ja: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
  other: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2

# 性能配置
performance:
  embedding_batch_size: 32
  max_text_length: 8192
  cache_size: 1000
