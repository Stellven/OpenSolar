<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>用户登录功能 - DAG</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #111827;
      color: #F9FAFB;
      padding: 20px;
    }
    h1 { text-align: center; margin-bottom: 20px; }
    .container { overflow-x: auto; }
    svg { display: block; margin: 0 auto; }
    .legend {
      display: flex; justify-content: center; gap: 20px;
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 8px; }
    .legend-dot { width: 16px; height: 16px; border-radius: 50%; }
    .node:hover rect { stroke: #60A5FA; stroke-width: 3; cursor: pointer; }
  </style>
</head>
<body>
  <h1>用户登录功能 - DAG</h1>

  <div class="legend">
    
      <div class="legend-item">
        <div class="legend-dot" style="background: #9CA3AF"></div>
        <span>pending</span>
      </div>
    
      <div class="legend-item">
        <div class="legend-dot" style="background: #FBBF24"></div>
        <span>running</span>
      </div>
    
      <div class="legend-item">
        <div class="legend-dot" style="background: #10B981"></div>
        <span>completed</span>
      </div>
    
      <div class="legend-item">
        <div class="legend-dot" style="background: #EF4444"></div>
        <span>failed</span>
      </div>
    
      <div class="legend-item">
        <div class="legend-dot" style="background: #6B7280"></div>
        <span>skipped</span>
      </div>
    
  </div>

  <div class="container">
    <svg width="800" height="1100">
      <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#6B7280"/>
        </marker>
      </defs>

      <!-- Edges -->
      
      <path d="M490,130 C490,170 490,210 490,250"
            stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    
      <path d="M490,330 C490,370 290,410 290,450"
            stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    
      <path d="M490,330 C490,370 490,410 490,450"
            stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    
      <path d="M290,530 C290,570 490,610 490,650"
            stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    
      <path d="M490,530 C490,570 490,610 490,650"
            stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    
      <path d="M490,730 C490,770 490,810 490,850"
            stroke="#6B7280" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    

      <!-- Nodes -->
      
        <g class="node" data-id="step-0">
          <rect x="310" y="50" width="180" height="80" rx="8"
                fill="#10B981" stroke="#374151" stroke-width="2"/>
          <text x="400" y="75" text-anchor="middle"
                fill="white" font-weight="bold" font-size="14">step-0</text>
          <text x="400" y="95" text-anchor="middle"
                fill="white" font-size="12">Researcher</text>
          <text x="400" y="115" text-anchor="middle"
                fill="white" font-size="11" opacity="0.8">分析需求</text>
        </g>
      
        <g class="node" data-id="step-1">
          <rect x="310" y="250" width="180" height="80" rx="8"
                fill="#10B981" stroke="#374151" stroke-width="2"/>
          <text x="400" y="275" text-anchor="middle"
                fill="white" font-weight="bold" font-size="14">step-1</text>
          <text x="400" y="295" text-anchor="middle"
                fill="white" font-size="12">Architect</text>
          <text x="400" y="315" text-anchor="middle"
                fill="white" font-size="11" opacity="0.8">设计数据模型</text>
        </g>
      
        <g class="node" data-id="step-2">
          <rect x="210" y="450" width="180" height="80" rx="8"
                fill="#FBBF24" stroke="#374151" stroke-width="2"/>
          <text x="300" y="475" text-anchor="middle"
                fill="white" font-weight="bold" font-size="14">step-2</text>
          <text x="300" y="495" text-anchor="middle"
                fill="white" font-size="12">Coder</text>
          <text x="300" y="515" text-anchor="middle"
                fill="white" font-size="11" opacity="0.8">实现用户模型</text>
        </g>
      
        <g class="node" data-id="step-3">
          <rect x="410" y="450" width="180" height="80" rx="8"
                fill="#9CA3AF" stroke="#374151" stroke-width="2"/>
          <text x="500" y="475" text-anchor="middle"
                fill="white" font-weight="bold" font-size="14">step-3</text>
          <text x="500" y="495" text-anchor="middle"
                fill="white" font-size="12">Coder</text>
          <text x="500" y="515" text-anchor="middle"
                fill="white" font-size="11" opacity="0.8">实现认证逻辑</text>
        </g>
      
        <g class="node" data-id="step-4">
          <rect x="310" y="650" width="180" height="80" rx="8"
                fill="#9CA3AF" stroke="#374151" stroke-width="2"/>
          <text x="400" y="675" text-anchor="middle"
                fill="white" font-weight="bold" font-size="14">step-4</text>
          <text x="400" y="695" text-anchor="middle"
                fill="white" font-size="12">Tester</text>
          <text x="400" y="715" text-anchor="middle"
                fill="white" font-size="11" opacity="0.8">编写单元测试</text>
        </g>
      
        <g class="node" data-id="step-5">
          <rect x="310" y="850" width="180" height="80" rx="8"
                fill="#9CA3AF" stroke="#374151" stroke-width="2"/>
          <text x="400" y="875" text-anchor="middle"
                fill="white" font-weight="bold" font-size="14">step-5</text>
          <text x="400" y="895" text-anchor="middle"
                fill="white" font-size="12">Reviewer</text>
          <text x="400" y="915" text-anchor="middle"
                fill="white" font-size="11" opacity="0.8">代码审查</text>
        </g>
      
    </svg>
  </div>

  <script>
    document.querySelectorAll('.node').forEach(node => {
      node.addEventListener('click', () => {
        const id = node.dataset.id;
        console.log('Clicked:', id);
        // TODO: 显示详情面板
      });
    });
  </script>
</body>
</html>
