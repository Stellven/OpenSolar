name: Solar CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "23 9 * * *"

permissions:
  contents: read

concurrency:
  group: solar-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-smoke:
    name: Python smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest requests pyyaml beautifulsoup4

      - name: Syntax check critical runtime files
        run: |
          python -m py_compile \
            harness/lib/graph_node_dispatcher.py \
            harness/lib/symphony/status-server.py \
            harness/scripts/tech_hotspot_radar.py

      - name: Run graph and dispatch smoke tests
        env:
          SOLAR_GRAPH_BUILDER_OPERATOR_POOL: "0"
        run: |
          python -m pytest -q \
            harness/tests/graph/test_pm_inbox_closeout_reconcile.py \
            harness/tests/graph/test_graph_status_sync.py \
            harness/tests/graph/test_parent_ready_closeout.py \
            harness/tests/graph/test_task_graph_state_io.py \
            harness/tests/graph/test_graph_dispatch_lease_busy.py \
            harness/tests/graph/test_graph_dispatch_submit.py \
            harness/tests/graph/test_worker_assignment_reasons.py \
            harness/tests/test_eval_verdict_evidence_gate_wiring.py \
            harness/tests/test_pm_dispatch.py

  hf-ai-influence-smoke:
    name: HF and AI Influence smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest requests pyyaml beautifulsoup4

      - name: Run HF and report center smoke tests
        run: |
          python -m pytest -q \
            harness/tests/test_tech_hotspot_browser_agent_cmd.py \
            harness/tests/test_hf_paper_insight_runtime.py \
            harness/tests/test_hf_paper_insight_schema.py \
            harness/tests/test_hf_paper_insight_scoring.py \
            harness/tests/test_ai_influence_status_server.py
          python harness/tests/test-status-server-ai-influence.py

  harness-shell-smoke:
    name: Harness shell smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest requests pyyaml beautifulsoup4

      - name: Run shell smoke tests
        env:
          SOLAR_GRAPH_BUILDER_OPERATOR_POOL: "0"
        run: |
          bash harness/tests/test-autopilot-prereq-dict.sh
          bash harness/tests/test-coordinator-dispatch-template-escaping.sh
          bash harness/tests/test-graph-dispatch-pane-role-guard.sh
          bash harness/tests/test-multi-task-entrypoint.sh
          bash harness/tests/test-pm-planner-html-artifacts.sh

  verification-release-gate:
    name: Verification release gate
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PYTHONPATH: harness
      SOLAR_GRAPH_BUILDER_OPERATOR_POOL: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest requests pyyaml beautifulsoup4

      - name: Run evaluator and closeout gate tests
        run: |
          python -m pytest -q \
            harness/tests/graph/test_acceptance_closeout.py \
            harness/tests/graph/test_node_proof_obligations.py \
            harness/tests/graph/test_evaluation_plan_dispatch.py \
            harness/tests/graph/test_evaluator_pool_discovery.py \
            harness/tests/runtime/test_verification_gate.py \
            harness/tests/test_compile_eval.py \
            harness/tests/test_compiled_sprint_review_closeout.py \
            harness/tests/test_hf_s05_verification_release_closeout.py \
            harness/tests/test_thunderomlx_kvtc_s05_closeout.py \
            harness/tests/research_unit/test_evaluator.py \
            harness/tests/research_unit/test_cli.py \
            harness/tests/research_survey/test_survey_evaluator.py

  release-packaging-smoke:
    name: Release packaging smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      HARNESS_DIR: ${{ github.workspace }}/harness
    defaults:
      run:
        working-directory: harness
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Run release packaging smoke
        run: |
          bash -n release/build.sh
          bash -n release/publish.sh
          test -f VERSION
          test -f release/CHANGELOG.md
          grep -q "S7" release/CHANGELOG.md
          test -f docs/upgrade-guide.md
          test -f docs/rollback-guide.md
          for n in 001 002 003 004 005; do
            ls ADR/ADR-${n}-*.md >/dev/null
          done
          set +e
          dry_run_output="$(bash release/build.sh --dry-run 2>&1)"
          dry_run_rc=$?
          set -e
          echo "$dry_run_output"
          test "$dry_run_rc" -ge 0
          echo "$dry_run_output" | grep -q "would create"
          echo "$dry_run_output" | grep -q "Exclusions"
          python - <<'PY'
          import json
          import subprocess
          import sys
          result = subprocess.run(
              [sys.executable, "lib/plugin_loader.py", "validate", "--json"],
              check=True,
              capture_output=True,
              text=True,
          )
          payload = json.loads(result.stdout)
          assert payload.get("ok") is True, payload
          PY
          python -m py_compile lib/plugin_loader.py lib/graph_scheduler.py lib/graph_node_dispatcher.py
