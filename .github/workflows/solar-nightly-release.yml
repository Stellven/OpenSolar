name: Solar Nightly Release Gate

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run preflight only, or run the full external release gate."
        required: true
        default: "preflight"
        type: choice
        options:
          - preflight
          - full
  schedule:
    - cron: "47 10 * * *"

permissions:
  contents: read

concurrency:
  group: solar-nightly-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-environment-preflight:
    name: Release environment preflight
    runs-on: ${{ vars.SOLAR_NIGHTLY_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 20
    env:
      HARNESS_DIR: ${{ github.workspace }}/harness
      SOLAR_TVS_ROOT: ${{ vars.SOLAR_TVS_ROOT }}
    defaults:
      run:
        working-directory: harness
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install preflight dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Check release prerequisites
        run: |
          python lib/nightly_release_doctor.py --harness-dir "$HARNESS_DIR" --json
          python lib/nightly_release_doctor.py --harness-dir "$HARNESS_DIR" --markdown >> "$GITHUB_STEP_SUMMARY"

  full-release-gate:
    name: Full release gate
    runs-on: ${{ vars.SOLAR_NIGHTLY_RUNNER || 'ubuntu-latest' }}
    timeout-minutes: 90
    needs:
      - release-environment-preflight
    if: >-
      (github.event_name == 'workflow_dispatch' && inputs.mode == 'full') ||
      (github.event_name == 'schedule' && vars.SOLAR_NIGHTLY_RELEASE_FULL == '1')
    env:
      HARNESS_DIR: ${{ github.workspace }}/harness
      SOLAR_TVS_ROOT: ${{ vars.SOLAR_TVS_ROOT }}
    defaults:
      run:
        working-directory: harness
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest requests pyyaml beautifulsoup4

      - name: Require external release dependencies
        run: |
          python lib/nightly_release_doctor.py --harness-dir "$HARNESS_DIR" --require-full --markdown

      - name: Run full S7 release tooling gate
        run: |
          bash tests/release/test-s7-release.sh
