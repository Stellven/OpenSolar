<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="780" viewBox="0 0 1200 780" role="img" aria-labelledby="title desc"><title id="title">Solar Operator DAG Runtime</title><desc id="desc">Logical operators are bound to heterogeneous physical AI operators and scheduled as a DAG.</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#090e1a"/><stop offset="1" stop-color="#172033"/></linearGradient><linearGradient id="g" x1="0" x2="1"><stop offset="0" stop-color="#22d3ee"/><stop offset="1" stop-color="#a78bfa"/></linearGradient><style>.bg{fill:url(#bg)}.box{fill:#0f172a;stroke:#334155;stroke-width:1.2}.hot{fill:#111c34;stroke:url(#g);stroke-width:2}.txt{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#e5e7eb}.muted{fill:#94a3b8}.h{font-size:24px;font-weight:700}.m{font-size:15px;font-weight:650}.s{font-size:13px}.line{stroke:#64748b;stroke-width:1.5;fill:none;marker-end:url(#arrow)}.dash{stroke:#475569;stroke-width:1.2;fill:none;stroke-dasharray:6 5;marker-end:url(#arrow)}.pill{fill:#172554;stroke:#2563eb}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs><rect class="bg" width="1200" height="780" rx="28"/><text class="txt h" x="50" y="56">Agentic DAG Runtime: Logical Operators → Physical Operators</text><text class="muted s" x="50" y="84">Solar separates what needs to be done from who executes it, then schedules heterogeneous AI execution surfaces.</text><g transform="translate(70,135)"><rect class="box" width="250" height="430" rx="20"/><text class="txt m" x="24" y="34">Logical Operators</text><text class="muted s" x="24" y="62">Stable semantic work units</text><g transform="translate(24,90)"><rect class="hot" width="200" height="42" rx="14"/><text class="txt s" x="18" y="27">CompileRequirement</text></g><g transform="translate(24,150)"><rect class="hot" width="200" height="42" rx="14"/><text class="txt s" x="18" y="27">BuildTaskGraph</text></g><g transform="translate(24,210)"><rect class="hot" width="200" height="42" rx="14"/><text class="txt s" x="18" y="27">ImplementCode</text></g><g transform="translate(24,270)"><rect class="hot" width="200" height="42" rx="14"/><text class="txt s" x="18" y="27">RunBrowserResearch</text></g><g transform="translate(24,330)"><rect class="hot" width="200" height="42" rx="14"/><text class="txt s" x="18" y="27">EvaluateEvidence</text></g></g><g transform="translate(475,135)"><rect class="hot" width="250" height="430" rx="20"/><text class="txt m" x="24" y="34">Physical Planner</text><text class="muted s" x="24" y="62">Binds tasks to execution surfaces</text><text class="muted s" x="24" y="105">Inputs</text><text class="txt s" x="24" y="132">• task risk and scope</text><text class="txt s" x="24" y="158">• capability requirements</text><text class="txt s" x="24" y="184">• worker health and lease</text><text class="txt s" x="24" y="210">• model cost and quota</text><text class="txt s" x="24" y="236">• evidence requirements</text><text class="muted s" x="24" y="286">Outputs</text><text class="txt s" x="24" y="313">• dispatch plan</text><text class="txt s" x="24" y="339">• fallback ladder</text><text class="txt s" x="24" y="365">• capsule injection</text><text class="txt s" x="24" y="391">• evaluator gate</text></g><g transform="translate(870,110)"><rect class="box" width="260" height="500" rx="20"/><text class="txt m" x="24" y="34">Physical Operators</text><text class="muted s" x="24" y="62">AI-capable execution surfaces</text><g transform="translate(24,90)"><rect class="pill" width="210" height="38" rx="13"/><text class="txt s" x="16" y="24">Claude Code Pane</text></g><g transform="translate(24,142)"><rect class="pill" width="210" height="38" rx="13"/><text class="txt s" x="16" y="24">Codex Instance</text></g><g transform="translate(24,194)"><rect class="pill" width="210" height="38" rx="13"/><text class="txt s" x="16" y="24">DeepSeek Reasonix</text></g><g transform="translate(24,246)"><rect class="pill" width="210" height="38" rx="13"/><text class="txt s" x="16" y="24">GPT / Gemini Web</text></g><g transform="translate(24,298)"><rect class="pill" width="210" height="38" rx="13"/><text class="txt s" x="16" y="24">Browser Operator</text></g><g transform="translate(24,350)"><rect class="pill" width="210" height="38" rx="13"/><text class="txt s" x="16" y="24">Remote Worker</text></g><g transform="translate(24,402)"><rect class="pill" width="210" height="38" rx="13"/><text class="txt s" x="16" y="24">API / Local Model</text></g></g><path class="line" d="M320 350 H475"/><path class="line" d="M725 350 H870"/><g transform="translate(360,640)"><rect class="box" width="480" height="76" rx="18"/><text class="txt m" x="26" y="32">Evidence-gated execution</text><text class="muted s" x="26" y="56">handoff · eval · session log · deterministic gate · parent verdict</text></g><path class="dash" d="M595 565 V640"/><path class="dash" d="M1000 610 C950 655 860 675 840 675"/></svg>