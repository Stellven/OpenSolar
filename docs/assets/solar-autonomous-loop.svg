<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc"><title id="title">Solar Autonomous Software Organization Loop</title><desc id="desc">Solar autonomous loop from boss command to requirement compiler, AI organization execution, evidence gates, context memory, and meta harness optimization.</desc><defs><linearGradient id="bg" x1="0" x2="1" y1="0" y2="1"><stop offset="0" stop-color="#08111f"/><stop offset="1" stop-color="#111827"/></linearGradient><linearGradient id="a" x1="0" x2="1"><stop offset="0" stop-color="#14b8a6"/><stop offset="1" stop-color="#8b5cf6"/></linearGradient><style>.bg{fill:url(#bg)}.box{fill:#0f172a;stroke:#334155;stroke-width:1.2}.hot{fill:#111c34;stroke:url(#a);stroke-width:2}.txt{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#e5e7eb}.muted{fill:#94a3b8}.h{font-size:24px;font-weight:700}.m{font-size:16px;font-weight:650}.s{font-size:13px}.line{stroke:#64748b;stroke-width:1.6;fill:none;marker-end:url(#arrow)}.loop{stroke:url(#a);stroke-width:2.3;fill:none;marker-end:url(#arrow)}.num{fill:#0f766e}.circle{fill:#0f172a;stroke:#22d3ee;stroke-width:2}</style><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto"><path d="M0,0 L10,3 L0,6 Z" fill="#64748b"/></marker></defs><rect class="bg" width="1200" height="760" rx="28"/><text class="txt h" x="50" y="58">Autonomous Software Organization Loop</text><text class="muted s" x="50" y="86">The user acts as boss; Solar compiles goals, manages AI workers, verifies evidence, and optimizes itself.</text><g transform="translate(95,150)"><circle class="circle" cx="90" cy="90" r="80"/><text class="txt m" text-anchor="middle" x="90" y="78">Boss</text><text class="muted s" text-anchor="middle" x="90" y="104">goal · boundary · budget</text></g><g transform="translate(365,105)"><rect class="hot" width="240" height="105" rx="18"/><text class="txt m" x="22" y="36">Boss Command Layer</text><text class="muted s" x="22" y="64">Intent envelope</text><text class="muted s" x="22" y="86">Autonomy policy</text></g><g transform="translate(760,105)"><rect class="hot" width="260" height="105" rx="18"/><text class="txt m" x="22" y="36">Requirement Compiler</text><text class="muted s" x="22" y="64">Contract · PRD · TaskGraph</text><text class="muted s" x="22" y="86">Capability & evidence plan</text></g><g transform="translate(860,300)"><rect class="box" width="250" height="125" rx="18"/><text class="txt m" x="22" y="36">AI Organization Runtime</text><text class="muted s" x="22" y="64">PM · Planner · Builders</text><text class="muted s" x="22" y="86">Evaluator · Autopilot</text><text class="muted s" x="22" y="108">Model fleet</text></g><g transform="translate(560,505)"><rect class="hot" width="260" height="115" rx="18"/><text class="txt m" x="22" y="36">Evidence Court</text><text class="muted s" x="22" y="64">Handoff · Eval · Gate</text><text class="muted s" x="22" y="86">Accepted artifacts</text></g><g transform="translate(230,505)"><rect class="box" width="250" height="115" rx="18"/><text class="txt m" x="22" y="36">Context & Experience</text><text class="muted s" x="22" y="64">Context Map · Session Log</text><text class="muted s" x="22" y="86">Scorecards · Gene Pool</text></g><g transform="translate(95,300)"><rect class="box" width="250" height="125" rx="18"/><text class="txt m" x="22" y="36">Meta Harness</text><text class="muted s" x="22" y="64">Replay · SideInfo</text><text class="muted s" x="22" y="86">Pareto frontier</text><text class="muted s" x="22" y="108">Promotion / rollback</text></g><path class="line" d="M275 240 C315 210 340 170 365 158"/><path class="line" d="M605 158 H760"/><path class="line" d="M890 210 C955 240 990 275 990 300"/><path class="line" d="M960 425 C890 470 835 500 790 520"/><path class="line" d="M560 562 H480"/><path class="line" d="M230 555 C170 515 135 460 145 425"/><path class="loop" d="M220 300 C260 260 315 230 365 210"/><text class="muted s" x="445" y="705">Principle: human as boss, AI as organization, evidence as completion, optimization as a controlled runtime process.</text></svg>