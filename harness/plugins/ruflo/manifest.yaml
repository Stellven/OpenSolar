---
id: ruflo
name: "Ruflo Multi-Agent Orchestration"
version: "3.7.0-alpha.19"
description: "Sandboxed Solar-Harness integration for ruvnet/ruflo / Claude Flow: Claude Code swarm orchestration, plugins, agents, memory and MCP architecture. Host-level init remains gated; the official @claude-flow/cli runtime is bootstrapped and smoked only in a local managed state/ruflo sandbox when explicitly requested."
status: enabled

write_scope:
  - "state/ruflo"
  - "reports/ruflo"

read_scope:
  - "vendor/ruflo"
  - "vendor/ruflo/plugins"
  - "vendor/ruflo/.agents"
  - "vendor/ruflo/.claude"

capabilities:
  - "ruflo.swarm"
  - "ruflo.plugins"
  - "ruflo.agent_catalog"
  - "ruflo.memory"
  - "ruflo.mcp"
  - "ruflo.workflow_templates"

commands:
  - "solar-harness integrations ruflo-status --json"
  - "solar-harness integrations ruflo-runtime-status --json"
  - "solar-harness integrations ruflo-runtime-bootstrap --json"
  - "solar-harness integrations ruflo-runtime-smoke --json"

background_safety:
  mode: bounded
  idle_only: false
  rate_limit: "sandbox-only"
  max_runtime_s: 900
  max_memory_mb: 1024

eval_packs:
  - "tests/plugins/test-s4-extension-framework.sh"

rollback:
  strategy: disable
  commands:
    - "solar-harness integrations disable ruflo"

integration_level: default_usable

entry: "vendor/ruflo/README.md"

events:
  - "ruflo.vendor_verified"
  - "ruflo.capability_registered"
  - "ruflo.runtime_smoked"

depends_on: []

tags:
  - "swarm"
  - "multi-agent"
  - "mcp"
  - "claude-code"
