# Solar Product Platform — gitleaks secret scanning config
# Covers Anthropic, OpenAI, Google, z.ai, DeepSeek, GitHub tokens and other secrets.
# Run: gitleaks detect --config=gitleaks.toml
title = "Solar Product Platform Gitleaks Config"

# Allowlist: test fixtures and example files only
[allowlist]
paths = [
  ".env.example",
  "config/defaults.yaml",
  "docker/smoke-test.sh",
  "tests/",
]

[[rules]]
id = "anthropic-api-key"
description = "Anthropic API key (sk-ant-)"
regex = '''sk-ant-(?:api\d{2}-.{95}|admin-[A-Za-z0-9+/]{16})'''
keywords = ["sk-ant", "anthropic"]

[[rules]]
id = "openai-api-key"
description = "OpenAI / compatible API key (sk-)"
regex = '''sk-(?:proj-)?[A-Za-z0-9_-]{32,}'''
keywords = ["sk-", "openai"]

[[rules]]
id = "google-ai-key"
description = "Google AI API key"
regex = '''AIza[0-9A-Za-z\-_]{35}'''
keywords = ["AIza", "google"]

[[rules]]
id = "github-token"
description = "GitHub personal access token"
regex = '''gh[po]_[A-Za-z0-9_]{36,}'''
keywords = ["ghp_", "gho_", "github"]

[[rules]]
id = "generic-api-key"
description = "Generic API key / bearer token patterns"
regex = '''(?i)(?:api[_-]?key|apikey|secret|token|password|credential)\s*[:=]\s*['"][A-Za-z0-9_\-+=/]{16,}['"]'''
keywords = ["api_key", "apikey", "secret", "token", "password", "credential"]

[[rules]]
id = "private-key"
description = "SSH / TLS private key block"
regex = '''-----BEGIN\s(?:RSA|OPENSSH|EC|DSA)\sPRIVATE\sKEY-----'''
keywords = ["BEGIN", "PRIVATE KEY"]

[[rules]]
id = "zai-deepseek-key"
description = "z.ai / DeepSeek / other provider API key"
regex = '''(?:zai|deepseek)[_-]?api[_-]?key\s*[:=]\s*['"][A-Za-z0-9_\-]{16,}['"]'''
keywords = ["zai", "deepseek"]

[[rules]]
id = "dotenv-file"
description = "Real .env file (not .env.example)"
path = '''(?i)(?<!\\.example)\\.env$'''
keywords = [".env"]

[[rules]]
id = "keychain-or-pem-file"
description = "Keychain or PEM files"
path = '''(?i)\.(key|pem|p12|pfx)$'''
keywords = [".key", ".pem", ".p12", ".pfx"]
