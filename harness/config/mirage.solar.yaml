# Solar Mirage workspace manifest
# Sprint: sprint-20260508-mirage-unified-vfs S1
# NEVER print secret values in --json output or events.
version: 1
workspace_id: solar-default
created_at: "2026-05-08T14:30:00Z"

mounts:
  - path: /knowledge
    source_type: disk
    root: "/Users/sihaoli/Knowledge"
    mode: ro
    description: "Obsidian vault (read-only)"

  - path: /raw
    source_type: disk
    root: "/Users/sihaoli/Knowledge/_raw"
    mode: rw
    redact_on_write: true
    description: "Staging area for new content"

  - path: /sources
    source_type: disk
    root: "/Users/sihaoli/.solar/harness/_sources"
    mode: ro
    description: "Canonical source library (read-only)"

  - path: /papers
    source_type: disk
    root: "/Users/sihaoli/.solar/harness/_sources/papers"
    mode: ro
    description: "Canonical papers and PDFs (read-only)"

  - path: /qmd
    source_type: virtual_command
    adapter: "solar-harness wiki qmd-search"
    mode: ro
    description: "QMD/MinerU semantic search (read-only)"

  - path: /solar-db
    source_type: disk
    root: "/Users/sihaoli/.solar/harness/_sources/solar-db"
    mode: ro
    deny_subpaths:
      - "secrets/"
      - ".env"
      - ".token"
      - "credentials"
    description: "Solar DB exported views and metadata (read-only)"

  - path: /cortex
    source_type: disk
    root: "/Users/sihaoli/.claude/core/cortex"
    mode: ro
    description: "Cortex knowledge base (read-only)"

  - path: /sprints
    source_type: disk
    root: "/Users/sihaoli/.solar/harness/sprints"
    mode: ro
    description: "Sprint artifacts (read-only)"

  - path: /drive
    source_type: gdrive
    root: "/Users/sihaoli/Library/CloudStorage/GoogleDrive-haogege1977@gmail.com"
    local_provider: "macos-google-drive-file-provider"
    credential_env: "GOOGLE_APPLICATION_CREDENTIALS"
    mode: ro
    optional: true
    description: "Google Drive local File Provider mount (optional, read-only by default)"

policy:
  default_timeout_s: 30
  max_stdout_bytes: 1048576
  allowed_verbs:
    - ls
    - find
    - grep
    - cat
    - head
    - wc
    - jq
    - echo
  redact_patterns:
    - "sk-[A-Za-z0-9]{20,}"
    - "Bearer [A-Za-z0-9._-]+"
    - "api_key=[^\\s\"']+"
    - "client_secret=[^\\s\"']+"
    - "refresh_token=[^\\s\"']+"
  drive:
    write_requires_flag: "--allow-write-drive"
  projects:
    write_requires_flag: "--allow-write-projects"
