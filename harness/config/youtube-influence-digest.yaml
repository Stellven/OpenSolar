version: 1
name: YouTube Influence Transcript Digest
mac_mini_only: true
allowed_hostnames:
- lisihaodeMac-mini-3.local
- lisihaodeMac-mini-3
- lisihaodeMini-3.local
- lisihaodeMini-3
timezone: America/Toronto
schedule:
  hours:
  - 8
  - 13
  - 18
  minute: 17
output:
  raw_dir: /Users/lisihao/Knowledge/_raw/youtube-influence-digest
  state_dir: /Users/lisihao/.solar/harness/state/youtube-influence-digest
  max_videos_per_run: 30
  per_channel_limit: 3
  lookback_hours: 72
  keep_seen_days: 45
  transcript_max_chars: 60000
  browser_agent_report:
    enabled: false
    requested_model: chatgpt-5.5-thinking-high
    phase2_batch_size: 2
    title_prefix: AI Influence YouTube Report
    lineage_prefix: ai-influence-youtube-report
    project_name: 杂项
    headless: true
    session_reuse: true
    timeout_seconds: 1800
fetch:
  timeout_seconds: 15
  sleep_between_channels_seconds: 3.0
  sleep_between_videos_seconds: 2.5
  max_consecutive_transcript_failures: 8
  user_agent: Solar-YouTube-Influence-Digest/1.0 (+local transcript capture)
asr:
  enabled: false
  # Local/premium ASR is disabled. Browser-agent transcript capture is the only
  # allowed no-caption fallback; failures must become metadata-only, not ASR jobs.
  blocking_for_knowledge_progress: false
  queue_health_policy: fallback_non_blocking
  max_per_run: 0
  queue_dir: /Users/lisihao/.solar/harness/state/youtube-influence-digest/asr-queue
  done_dir: /Users/lisihao/.solar/harness/state/youtube-influence-digest/asr-done
  audio_dir: /Users/lisihao/.solar/harness/state/youtube-influence-digest/asr-audio
  raw_dir: /Users/lisihao/Knowledge/_raw/youtube-influence-digest/asr
  yt_dlp_bin: /Users/lisihao/Solar/harness/.venv-youtube-digest/bin/yt-dlp
  ffmpeg_location: /opt/homebrew/bin
  js_runtimes: node:/Users/lisihao/n/bin/node
  whisper_bin: /opt/homebrew/bin/whisper
  whisper_model: small
  language: zh
  timeout_seconds: 7200
  sleep_between_jobs_seconds: 30
  cookies_from_browser: ''
  keep_audio: false
  cleanup_enabled: true
  audio_cache_max_mb: 2048
  audio_cache_max_age_hours: 24
  cleanup_min_age_minutes: 120
  postprocess:
    enabled: true
    backend: thunderomlx
    base_url: http://127.0.0.1:8002
    model: claude-3-5-sonnet-latest
    api_key_env: THUNDEROMLX_AUTH_TOKEN
    default_api_key: local-thunderomlx
    max_tokens: 1800
    max_input_chars: 12000
    timeout_seconds: 900
    enable_thinking: false
backfill:
  max_videos_per_run: 24
  per_channel_limit: 2
  sleep_between_channels_seconds: 15
  sleep_between_videos_seconds: 30
  max_consecutive_transcript_failures: 5
