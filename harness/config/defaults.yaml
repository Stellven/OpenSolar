# ─── Solar Product Platform: default configuration ───
# This file ships with the product. User overrides go in config/user.yaml
# or via the first-run wizard. NEVER include real secrets here.
version: 1
generated_by: installer

# ─── LLM providers ───
providers:
  anthropic:
    enabled: true
    api_key_env: ANTHROPIC_API_KEY
    base_url_env: ANTHROPIC_BASE_URL
    default_model: claude-sonnet-4-20250514
    models: [claude-sonnet-4-20250514, claude-opus-4-20250514]
  openai:
    enabled: false
    api_key_env: OPENAI_API_KEY
    base_url_env: OPENAI_BASE_URL
    default_model: gpt-5
    models: [gpt-5, gpt-5-mini]
  google:
    enabled: false
    api_key_env: GOOGLE_AI_API_KEY
    default_model: gemini-2.5-pro
    models: [gemini-2.5-pro, gemini-2.5-flash]
  zai:
    enabled: false
    api_key_env: ZAI_API_KEY
    base_url_env: ZAI_BASE_URL
    default_model: deepseek-v3
    models: [deepseek-v3, deepseek-r1, glm-5.1]

# ─── Vault / Knowledge ───
vault:
  path: ~/Knowledge
  auto_index: true
  qmd_enabled: true

# ─── Storage paths ───
storage:
  sources_root: _sources
  papers_root: _sources/papers
  raw_staging_root: _raw/file-uploads
  raw_ttl_days: 14

# ─── Mirage data access ───
mirage:
  enabled: true
  mounts: [/knowledge, /raw, /sources, /papers, /qmd, /solar-db, /cortex, /sprints]
  drive:
    enabled: false
    credentials_env: GOOGLE_DRIVE_TOKEN_PATH

# ─── Skills ───
skills:
  registry_path: skills/registry.yaml
  builtins_path: skills/builtins
  export_targets:
    - ~/.claude/skills
    - ~/.codex/skills
    - ~/.agents/skills
  canary_default_inject: false

# ─── MinerU PDF extraction ───
mineru:
  worker_type: launchd
  rate_limit_per_hour: 6
  memory_cap_mb: 2048
  idle_threshold_load: 1.0

# ─── QMD ───
qmd:
  index_targets: [_sources, ~/Knowledge]
  rebuild_strategy: incremental

# ─── Control plane ───
control_plane:
  state_db_path: run/state.db
  pane_lease_ttl_sec: 600
  autopilot_scan_interval_sec: 60

# ─── Secret scanning ───
secret_scan:
  gitleaks_config: gitleaks.toml
  pre_commit_hook: hooks/pre-commit-secret-scan
  pre_push_hook: hooks/pre-push-secret-scan
