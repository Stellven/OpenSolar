version: 1
name: GitHub Trends Digest

timezone: America/Toronto
schedule:
  hour: 7
  minute: 37

output:
  raw_dir: /Users/lisihao/Knowledge/_raw/github-trends-digest
  state_dir: /Users/lisihao/.solar/harness/state/github-trends
  database: /Users/lisihao/.solar/harness/state/github-trends/github-trends.sqlite
  retention_days: 100

fetch:
  timeout_seconds: 20
  sleep_between_requests_seconds: 8
  min_source_interval_hours: 6
  user_agent: "Solar-GitHub-Trends/1.0 (+local research digest)"
  github_token_env: GITHUB_TOKEN

sources:
  github_trending:
    enabled: true
    periods: [daily, weekly, monthly]
    url: https://github.com/trending
  trendshift:
    enabled: true
    url: https://trendshift.io/
  star_history_proxy:
    enabled: true
    # Star History is treated as the visualization/reference layer; Solar stores
    # daily GitHub API star snapshots locally for trend deltas.
    url: https://www.star-history.com/

categories:
  ai:
    label: AI / LLM
    keywords: [ai, artificial-intelligence, llm, gpt, claude, gemini, qwen, deepseek, transformer, diffusion]
  training_framework:
    label: Training Framework
    keywords: [training, finetune, fine-tuning, pytorch, jax, distributed, deepspeed, fsdp, dataset]
  compute_framework:
    label: Compute Framework
    keywords: [cuda, rocm, triton, kernel, inference, serving, vllm, mlx, webgpu, wasm, quantization]
  agent:
    label: Agent / Workflow
    keywords: [agent, agents, workflow, mcp, tool-use, automation, coding-agent, cursor, codex, claude-code]
  skill:
    label: Skill / Prompt / Templates
    keywords: [skill, prompt, prompts, template, playbook, recipe, workflow]
  infra_os:
    label: OS / Runtime / Infra
    keywords: [os, linux, runtime, container, kubernetes, observability, proxy, gateway, network]
  infra_db:
    label: DB / Search / Storage
    keywords: [database, db, postgres, sqlite, vector, search, storage, lakehouse, cache, redis]
  compiler:
    label: Compiler / Language
    keywords: [compiler, llvm, language, rust, zig, go, python, typescript, parser]
  middleware:
    label: Middleware
    keywords: [middleware, queue, message, broker, api, grpc, rpc, service-mesh]

tracked_topics:
  - name: ai
    category: ai
    query: ai OR llm OR agent
    enabled: true
  - name: large-model
    category: ai
    query: llm OR transformer OR reasoning
    enabled: true
  - name: training-framework
    category: training_framework
    query: training OR finetune OR distributed
    enabled: true
  - name: compute-framework
    category: compute_framework
    query: cuda OR triton OR inference OR mlx
    enabled: true
  - name: agent-skill
    category: agent
    query: agent OR mcp OR skill
    enabled: true
  - name: infra-software
    category: infra_os
    query: os OR db OR compiler OR middleware
    enabled: true

tracked_repos: []
