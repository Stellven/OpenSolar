version: 1
name: GitHub Trend Collector Retired
timezone: America/Toronto
schedule:
  hour: 7
  minute: 37
output:
  state_dir: ${HARNESS_DIR}/state/github-trends
  database: ${HARNESS_DIR}/state/github-trends/github-trends.sqlite
  retention_days: 100
fetch:
  timeout_seconds: 20
  sleep_between_requests_seconds: 8
  min_source_interval_hours: 6
  user_agent: Solar-GitHub-Trends/1.0 (+local research digest)
  github_token_env: GITHUB_TOKEN
sources:
  github_trending:
    enabled: true
    periods:
    - daily
    - weekly
    - monthly
    url: https://github.com/trending
  trendshift:
    enabled: true
    url: https://trendshift.io/
  star_history_proxy:
    enabled: true
    url: https://www.star-history.com/
categories:
  ai:
    label: AI / LLM
    keywords:
    - ai
    - artificial-intelligence
    - llm
    - gpt
    - claude
    - gemini
    - qwen
    - deepseek
    - transformer
    - diffusion
  training_framework:
    label: Training Framework
    keywords:
    - training
    - finetune
    - fine-tuning
    - pytorch
    - jax
    - distributed
    - deepspeed
    - fsdp
    - dataset
  compute_framework:
    label: Compute Framework
    keywords:
    - cuda
    - rocm
    - triton
    - kernel
    - inference
    - serving
    - vllm
    - mlx
    - webgpu
    - wasm
    - quantization
  agent:
    label: Agent / Workflow
    keywords:
    - agent
    - agents
    - workflow
    - mcp
    - tool-use
    - automation
    - coding-agent
    - cursor
    - codex
    - claude-code
  skill:
    label: Skill / Prompt / Templates
    keywords:
    - skill
    - prompt
    - prompts
    - template
    - playbook
    - recipe
    - workflow
  infra_os:
    label: OS / Runtime / Infra
    keywords:
    - os
    - linux
    - runtime
    - container
    - kubernetes
    - observability
    - proxy
    - gateway
    - network
  infra_db:
    label: DB / Search / Storage
    keywords:
    - database
    - db
    - postgres
    - sqlite
    - vector
    - search
    - storage
    - lakehouse
    - cache
    - redis
  compiler:
    label: Compiler / Language
    keywords:
    - compiler
    - llvm
    - language
    - rust
    - zig
    - go
    - python
    - typescript
    - parser
  middleware:
    label: Middleware
    keywords:
    - middleware
    - queue
    - message
    - broker
    - api
    - grpc
    - rpc
    - service-mesh
tracked_topics:
- name: ai
  category: ai
  query: ai OR llm OR agent
  enabled: true
- name: large-model
  category: ai
  query: llm OR transformer OR reasoning
  enabled: true
- name: training-framework
  category: training_framework
  query: training OR finetune OR distributed
  enabled: true
- name: compute-framework
  category: compute_framework
  query: cuda OR triton OR inference OR mlx
  enabled: true
- name: agent-skill
  category: agent
  query: agent OR mcp OR skill
  enabled: true
- name: infra-software
  category: infra_os
  query: os OR db OR compiler OR middleware
  enabled: true
- name: context-engineering
  category: agent
  query: context engineering OR agent memory OR knowledge graph
  enabled: true
- name: ai-coding-agent
  category: agent
  query: claude code OR codex OR coding agent OR mcp
  enabled: true
- name: physical-ai-robotics
  category: ai
  query: robotics OR physical ai OR vla OR embodied ai
  enabled: true
tracked_repos:
- anthropics/claude-plugins-official
- mattpocock/skills
- addyosmani/agent-skills
- colbymchenry/codegraph
- ChromeDevTools/chrome-devtools-mcp
- obra/superpowers
- rohitg00/agentmemory
- multica-ai/andrej-karpathy-skills
- TauricResearch/TradingAgents
