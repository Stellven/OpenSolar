capability_capsule_id: cap.understand-anything-indexer
version: 0.1.0
capsule_kind: capability
metadata:
  name: Understand Anything Indexer
  description: Dispatch the understand-anything skill into a TUI pane for repository indexing, while enforcing that semantic analysis phases must use ThunderOMLX as the governed backend.
applicability:
  task_types:
    - codebase-indexing
    - code-understanding
    - knowledge-extraction
  positive_signals:
    - understand-anything
    - knowledge graph
    - codebase index
    - onboarding
    - architecture map
  negative_signals:
    - browser
    - invoice
contract:
  inputs:
    required:
      - name: repo_path
        type: path
    optional:
      - name: language
        type: string
      - name: pane_target
        type: string
      - name: semantic_backend
        type: string
      - name: semantic_operator_id
        type: string
  outputs:
    required:
      - name: understand_anything_dispatch_result
        type: json
    optional:
      - name: understand_anything_bridge_contract
        type: json
      - name: knowledge_graph_path
        type: path
  preconditions:
    - check: task_type_in
      values:
        - codebase-indexing
        - code-understanding
        - knowledge-extraction
    - check: input_present
      field: repo_path
  postconditions:
    - check: output_present
      field: understand_anything_dispatch_result
  invariants:
    - The deterministic understand-anything scan/index chain may stay plugin-native, but semantic analysis must be routed through ThunderOMLX.
composition:
  consumes:
    - type: artifact.repo_workspace
  produces:
    - type: artifact.knowledge_graph
    - type: artifact.operator_bridge_contract
  compatible_with:
    - resource.repo-workspace
  incompatible_with: []
  requires_after: []
effects:
  read:
    - workspace.repo
  write:
    - artifacts.knowledge_graph
    - artifacts.operator_bridge_contract
  execute:
    - tmux_send_keys
    - understand_anything_skill
  network:
    - tmux_localhost
  cost:
    - local_runtime
    - thunderomlx_local
  risk:
    - auth_expiry
    - pane_target_mismatch
bindings:
  skills:
    required:
      - skill.understand-anything
    optional: []
  mcp_capabilities: {}
  data_refs:
    - data.repo_path
  secret_refs: []
  required_guard_capsules: []
  required_resource_capsules:
    - resource.repo-workspace
runtime_preferences:
  execution_surface: tui_pane_skill_command
  skill_command_template: /understand --language {language} {repo_path}
  pane_target: best_effort
  pane_target_selector: builder_idle
  semantic_backend: ThunderOMLX
  semantic_operator_id: mini-thunderomlx-qwen36-knowledge
  semantic_phase_enforced: true
verification:
  self_check:
    - check.understand_anything_dispatch_result_written
    - check.semantic_backend_thunderomlx_declared
    - check.semantic_proof_artifact_written
    - check.semantic_phase_request_written
  external_verifier:
    required: false
    preferred_capsules:
      - cap.requirement-compiler-verification
  pass_conditions:
    - understand_anything_dispatch_result exists
operator_compatibility:
  preferred:
    - mini-understand-anything-pane-bridge
  forbidden: []
provenance:
  owner: lisihao
  created_at: "2026-05-27T00:00:00Z"
