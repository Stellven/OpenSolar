capability_capsule_id: cap.requirement-compiler-planner
version: 0.1.0
capsule_kind: capability
metadata:
  name: Requirement Compiler Planner
  description: Convert compiled requirement artifacts into design, plan, and constrained task graph updates.
applicability:
  task_types:
    - planning
    - architecture
    - requirements
  positive_signals:
    - requirement
    - prd
    - contract
    - planner
    - design
    - task_graph
  negative_signals:
    - benchmark
    - frontend
contract:
  inputs:
    required:
      - name: requirement_ir
        type: json
      - name: product_brief
        type: markdown
    optional:
      - name: task_graph
        type: json
  outputs:
    required:
      - name: design_md
        type: markdown
      - name: plan_md
        type: markdown
    optional:
      - name: task_graph_patch
        type: json
  preconditions:
    - check: task_type_in
      values:
        - planning
        - architecture
        - requirements
  postconditions:
    - check: output_present
      field: design_md
    - check: output_present
      field: plan_md
  invariants:
    - Do not bypass compiled contracts when refining the plan.
    - Keep requirement coverage and acceptance mapping explicit.
composition:
  consumes:
    - type: artifact.requirement_ir
    - type: artifact.product_brief
  produces:
    - type: artifact.design_md
    - type: artifact.plan_md
  compatible_with:
    - guard.secret-leak-guard
    - resource.github-readonly
  incompatible_with:
    - cap.auto-merge-without-review
  requires_after:
    - guard.secret-leak-guard
effects:
  read:
    - requirement.artifacts
    - repo.read
  write:
    - artifacts.design
    - artifacts.plan
  execute: []
  network: []
  cost:
    - premium_model_quota
  risk:
    - planning_drift
bindings:
  skills:
    required:
      - skill.architecture-review
    optional: []
  mcp_capabilities: {}
  data_refs:
    - data.requirement_ir
  secret_refs: []
  required_guard_capsules:
    - guard.secret-leak-guard
  required_resource_capsules:
    - resource.github-readonly
verification:
  self_check:
    - check.design_plan_written
    - check.requirement_trace_visible
  external_verifier:
    required: true
    preferred_capsules:
      - cap.requirement-compiler-verification
  pass_conditions:
    - design_md exists
    - plan_md exists
operator_compatibility:
  preferred:
    - mini-claude-opus-planner
  forbidden:
    - mini-antigravity-gemini35-flash-high
provenance:
  owner: lisihao
  created_at: "2026-05-24T00:00:00Z"
