capability_capsule_id: resource.repo-workspace
version: 0.1.0
capsule_kind: resource
metadata:
  name: Repo Workspace Resource
  description: Resource capsule that provides scoped repo/worktree access for implementation and test nodes.
applicability:
  task_types:
    - implementation
    - debugging
    - tests
    - refactor
  positive_signals:
    - patch
    - diff
    - test
    - repo
  negative_signals: []
contract:
  inputs:
    required: []
    optional: []
  outputs:
    required:
      - name: resource_binding
        type: json
    optional: []
  preconditions:
    - check: task_type_in
      values:
        - implementation
        - debugging
        - tests
        - refactor
  postconditions:
    - check: output_present
      field: resource_binding
  invariants:
    - Repo/worktree access must stay within declared task scope.
composition:
  consumes: []
  produces:
    - type: artifact.resource_binding
  compatible_with:
    - cap.requirement-compiler-implementation
    - cap.requirement-compiler-verification
  incompatible_with: []
  requires_after: []
effects:
  read:
    - repo.read
  write:
    - repo.worktree
  execute: []
  network: []
  cost: []
  risk: []
bindings:
  skills:
    required: []
    optional: []
  mcp_capabilities: {}
  data_refs:
    - data.repo.snapshot
  secret_refs: []
  required_guard_capsules: []
  required_resource_capsules: []
verification:
  self_check:
    - check.resource_binding_written
  external_verifier:
    required: false
  pass_conditions:
    - resource_binding exists
operator_compatibility:
  preferred:
    - mini-claude-sonnet-builder
    - mini-claude-opus-evaluator
  forbidden: []
provenance:
  owner: lisihao
  created_at: "2026-05-24T00:00:00Z"
