capability_capsule_id: cap.flashmlx-performance-debugger
version: 0.1.0
capsule_kind: capability
metadata:
  name: FlashMLX Performance Debugger
  description: Debug FlashMLX or MLX performance regressions with benchmark evidence and verifier hooks.
applicability:
  task_types:
    - PERFORMANCE_REGRESSION
    - PERFORMANCE_KERNEL_DEBUG
    - ROOT_CAUSE_DEBUG
  positive_signals:
    - throughput
    - ttft
    - memory
    - flashmlx
    - mlx
    - benchmark
  negative_signals:
    - frontend
    - ui
contract:
  inputs:
    required:
      - name: repo_path
        type: repo
      - name: benchmark_log
        type: file
    optional:
      - name: profiler_trace
        type: file
  outputs:
    required:
      - name: root_cause_report
        type: markdown
      - name: benchmark_report
        type: markdown
    optional:
      - name: patch_diff
        type: diff
  preconditions:
    - check: input_present
      field: repo_path
    - check: input_present
      field: benchmark_log
  postconditions:
    - check: output_present
      field: root_cause_report
    - check: output_present
      field: benchmark_report
  invariants:
    - Do not claim benchmark improvement without evidence.
    - Do not modify public API without explicit request.
composition:
  consumes:
    - type: artifact.repo_snapshot
    - type: artifact.benchmark_log
  produces:
    - type: artifact.root_cause_report
    - type: artifact.benchmark_report
  compatible_with:
    - guard.secret-leak-guard
    - resource.github-readonly
  incompatible_with:
    - cap.auto-merge-without-review
  requires_after:
    - guard.secret-leak-guard
effects:
  read:
    - repo.source_code
    - benchmark.logs
  write:
    - artifacts.reports
  execute:
    - shell.pytest
    - shell.benchmark
  network:
    - docs_search
  cost:
    - premium_model_quota
  risk:
    - incorrect_patch
bindings:
  skills:
    required:
      - skill.root-cause-debug
      - skill.benchmark-analysis
    optional: []
  mcp_capabilities:
    git.read:
      - readonly
    shell.benchmark:
      - limited
  data_refs:
    - data.flashmlx.baseline_benchmarks
  secret_refs: []
  required_guard_capsules:
    - guard.secret-leak-guard
  required_resource_capsules:
    - resource.github-readonly
verification:
  self_check:
    - check.required_outputs_exist
    - check.benchmark_evidence_present
  external_verifier:
    required: true
    preferred_capsules:
      - guard.secret-leak-guard
  pass_conditions:
    - root_cause_report exists
    - benchmark_report exists
operator_compatibility:
  preferred:
    - mini-claude-sonnet-builder
  forbidden:
    - mini-antigravity-gemini35-flash-high
provenance:
  owner: lisihao
  created_at: "2026-05-24T00:00:00Z"
