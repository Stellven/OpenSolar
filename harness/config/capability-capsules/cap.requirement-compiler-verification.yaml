capability_capsule_id: cap.requirement-compiler-verification
version: 0.1.0
capsule_kind: capability
metadata:
  name: Requirement Compiler Verification
  description: Verify implementation, evidence, and acceptance coverage before closeout.
applicability:
  task_types:
    - tests
    - graph_eval
    - verification
    - review
    - evidence
  positive_signals:
    - verifier
    - review
    - evidence
    - acceptance
    - coverage
  negative_signals:
    - bulk-extraction
contract:
  inputs:
    required:
      - name: requirement_ir
        type: json
      - name: handoff_md
        type: markdown
    optional:
      - name: patch_diff
        type: diff
      - name: test_log
        type: text
  outputs:
    required:
      - name: eval_md
        type: markdown
      - name: eval_json
        type: json
    optional: []
  preconditions:
    - check: task_type_in
      values:
        - tests
        - graph_eval
        - verification
        - review
        - evidence
  postconditions:
    - check: output_present
      field: eval_md
    - check: output_present
      field: eval_json
  invariants:
    - Do not PASS without explicit evidence and acceptance coverage alignment.
composition:
  consumes:
    - type: artifact.handoff_md
    - type: artifact.requirement_ir
  produces:
    - type: artifact.eval_md
    - type: artifact.eval_json
  compatible_with:
    - guard.secret-leak-guard
    - resource.github-readonly
  incompatible_with:
    - cap.auto-merge-without-review
  requires_after:
    - guard.secret-leak-guard
effects:
  read:
    - repo.read
    - artifacts.handoff
    - artifacts.patch
  write:
    - artifacts.eval
  execute:
    - shell.pytest
  network: []
  cost:
    - premium_model_quota
  risk:
    - false_pass
bindings:
  skills:
    required:
      - skill.patch-review-hardcore
    optional: []
  mcp_capabilities: {}
  data_refs:
    - data.requirement_ir
  secret_refs: []
  required_guard_capsules:
    - guard.secret-leak-guard
  required_resource_capsules:
    - resource.github-readonly
verification:
  self_check:
    - check.eval_written
    - check.coverage_reviewed
  external_verifier:
    required: true
    preferred_capsules:
      - guard.secret-leak-guard
  pass_conditions:
    - eval_md exists
    - eval_json exists
operator_compatibility:
  preferred:
    - mini-claude-opus-evaluator
  forbidden:
    - mini-antigravity-gemini35-flash-high
provenance:
  owner: lisihao
  created_at: "2026-05-24T00:00:00Z"
