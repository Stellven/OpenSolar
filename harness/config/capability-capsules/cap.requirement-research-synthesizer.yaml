capability_capsule_id: cap.requirement-research-synthesizer
version: 0.1.0
capsule_kind: capability
metadata:
  name: Requirement Research Synthesizer
  description: Synthesize research evidence into actionable design, PRD, and task-graph implications.
applicability:
  task_types:
    - research
    - evidence
  positive_signals:
    - synthesis
    - implication
    - critique
    - evidence
    - research
  negative_signals:
    - simple_patch
contract:
  inputs:
    required:
      - name: source_manifest
        type: json
    optional:
      - name: claims_ledger
        type: jsonl
  outputs:
    required:
      - name: synthesis_md
        type: markdown
    optional:
      - name: implications_md
        type: markdown
  preconditions:
    - check: task_type_in
      values:
        - research
        - evidence
  postconditions:
    - check: output_present
      field: synthesis_md
  invariants:
    - Synthesis must distinguish evidence-backed facts from hypotheses.
composition:
  consumes:
    - type: artifact.source_manifest
  produces:
    - type: artifact.synthesis_md
  compatible_with:
    - guard.secret-leak-guard
    - resource.github-readonly
  incompatible_with: []
  requires_after:
    - cap.requirement-compiler-verification
effects:
  read:
    - artifacts.research
  write:
    - artifacts.synthesis
  execute: []
  network: []
  cost:
    - premium_model_quota
  risk:
    - unsupported_implication
bindings:
  skills:
    required:
      - skill.research-synthesis
    optional: []
  mcp_capabilities: {}
  data_refs:
    - data.requirement_ir
  secret_refs: []
  required_guard_capsules:
    - guard.secret-leak-guard
  required_resource_capsules:
    - resource.github-readonly
verification:
  self_check:
    - check.synthesis_written
  external_verifier:
    required: true
    preferred_capsules:
      - cap.requirement-compiler-verification
  pass_conditions:
    - synthesis_md exists
operator_compatibility:
  preferred:
    - mini-claude-opus-planner
    - mini-claude-opus-evaluator
  forbidden:
    - mini-antigravity-gemini35-flash-high
provenance:
  owner: lisihao
  created_at: "2026-05-24T00:00:00Z"
