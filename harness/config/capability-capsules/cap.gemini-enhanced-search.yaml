capability_capsule_id: cap.gemini-enhanced-search
version: 0.1.0
capsule_kind: capability
metadata:
  name: Gemini Enhanced Search
  description: Rewrite a research prompt through the saved Gemini Gem persona, run Deep Research, and emit structured analysis plus citation links for downstream planning and report flows.
applicability:
  task_types:
    - gemini-enhanced-search
    - research
  positive_signals:
    - gemini
    - deep research
    - enhanced search
    - citations
    - source links
    - 李教授提示词大师
  negative_signals:
    - refactor
contract:
  inputs:
    required:
      - name: prompt
        type: markdown
    optional:
      - name: gem_name
        type: string
      - name: rewrite_model
        type: string
      - name: research_model
        type: string
  outputs:
    required:
      - name: gemini_enhanced_search_result
        type: json
    optional:
      - name: analysis_markdown
        type: markdown
  preconditions:
    - check: task_type_in
      values:
        - gemini-enhanced-search
        - research
  postconditions:
    - check: output_present
      field: gemini_enhanced_search_result
  invariants:
    - The result must contain both rewritten_prompt and citation links.
composition:
  consumes:
    - type: artifact.prompt
  produces:
    - type: artifact.research_analysis
    - type: artifact.citation_bundle
  compatible_with:
    - guard.secret-leak-guard
    - resource.repo-workspace
  incompatible_with: []
  requires_after: []
effects:
  read:
    - artifacts.prompt
  write:
    - artifacts.research
  execute:
    - gemini_cli
  network:
    - gemini.google.com
  cost:
    - model_quota
  risk:
    - auth_expiry
    - quota_backoff
bindings:
  skills:
    required:
      - skill.research
    optional: []
  mcp_capabilities: {}
  data_refs:
    - data.prompt
  secret_refs: []
  required_guard_capsules:
    - guard.secret-leak-guard
  required_resource_capsules:
    - resource.repo-workspace
verification:
  self_check:
    - check.gemini_enhanced_search_result_written
  external_verifier:
    required: false
    preferred_capsules:
      - cap.requirement-compiler-verification
  pass_conditions:
    - gemini_enhanced_search_result exists
operator_compatibility:
  preferred:
    - mini-gemini-enhanced-search
  forbidden: []
provenance:
  owner: lisihao
  created_at: "2026-05-27T00:00:00Z"
