capability_capsule_id: cap.requirement-compiler-implementation
version: 0.1.0
capsule_kind: capability
metadata:
  name: Requirement Compiler Implementation
  description: Execute scoped implementation tasks derived from compiled requirement packages.
applicability:
  task_types:
    - implementation
    - debugging
    - refactor
  positive_signals:
    - patch
    - implementation
    - builder
    - code
    - test
  negative_signals:
    - benchmark_only
contract:
  inputs:
    required:
      - name: requirement_ir
        type: json
      - name: task_graph_node
        type: json
    optional:
      - name: design_md
        type: markdown
  outputs:
    required:
      - name: patch_diff
        type: diff
      - name: handoff_md
        type: markdown
    optional:
      - name: test_log
        type: text
  preconditions:
    - check: task_type_in
      values:
        - implementation
        - debugging
        - refactor
  postconditions:
    - check: output_present
      field: patch_diff
    - check: output_present
      field: handoff_md
  invariants:
    - Implementation must stay within declared scope and acceptance coverage.
    - Handoff must include execution evidence or explicit unverified notes.
composition:
  consumes:
    - type: artifact.requirement_ir
    - type: artifact.task_graph_node
  produces:
    - type: artifact.patch_diff
    - type: artifact.handoff_md
  compatible_with:
    - guard.secret-leak-guard
    - resource.repo-workspace
  incompatible_with:
    - cap.auto-merge-without-review
  requires_after:
    - cap.requirement-compiler-verification
effects:
  read:
    - repo.read
    - requirement.artifacts
  write:
    - repo.worktree
    - artifacts.handoff
  execute:
    - shell.pytest
  network: []
  cost:
    - medium_model_quota
  risk:
    - patch_scope_drift
bindings:
  skills:
    required:
      - skill.multi-file-implementation
    optional: []
  mcp_capabilities: {}
  data_refs:
    - data.requirement_ir
  secret_refs: []
  required_guard_capsules:
    - guard.secret-leak-guard
  required_resource_capsules:
    - resource.repo-workspace
verification:
  self_check:
    - check.patch_within_scope
    - check.handoff_written
  external_verifier:
    required: true
    preferred_capsules:
      - cap.requirement-compiler-verification
  pass_conditions:
    - patch_diff exists
    - handoff_md exists
operator_compatibility:
  preferred:
    - mini-claude-sonnet-builder
  forbidden:
    - mini-antigravity-gemini35-flash-high
provenance:
  owner: lisihao
  created_at: "2026-05-24T00:00:00Z"
