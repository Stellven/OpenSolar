capability_capsule_id: adapter.patch-diff-to-verification-pack
version: 0.1.0
capsule_kind: capability
metadata:
  name: Patch Diff To Verification Pack Adapter
  description: Turn a patch diff into verification-facing artifacts such as test evidence and evaluator input packs.
applicability:
  task_types:
    - implementation
    - verification
    - review
  positive_signals:
    - patch_diff
    - verification
    - eval
  negative_signals: []
contract:
  inputs:
    required:
      - name: patch_diff
        type: diff
    optional: []
  outputs:
    required:
      - name: test_log
        type: text
    optional:
      - name: eval_json
        type: json
  preconditions:
    - check: task_type_in
      values:
        - implementation
        - verification
        - review
  postconditions:
    - check: output_present
      field: test_log
  invariants:
    - Verification pack adapters must preserve file scope and test provenance.
composition:
  consumes:
    - type: artifact.patch_diff
  produces:
    - type: artifact.test_log
    - type: artifact.eval_json
  compatible_with: []
  incompatible_with: []
  requires_after: []
effects:
  read:
    - artifacts.patch
  write:
    - artifacts.eval
    - artifacts.test
  execute: []
  network: []
  cost: []
  risk: []
bindings:
  skills:
    required: []
    optional: []
  mcp_capabilities: {}
  data_refs: []
  secret_refs: []
  required_guard_capsules: []
  required_resource_capsules: []
verification:
  self_check:
    - check.verification_pack_written
  external_verifier:
    required: false
  pass_conditions:
    - test_log exists
operator_compatibility:
  preferred: []
  forbidden: []
provenance:
  owner: lisihao
  created_at: "2026-05-25T00:00:00Z"
