capability_capsule_id: cap.skill-execution-bridge
version: 0.1.0
capsule_kind: capability
metadata:
  name: Skill Execution Bridge
  description: Generic bridge that turns selected installed skills into a controlled pane-dispatch task with explicit prompt artifact, execution surface, and result contract.
applicability:
  task_types:
    - implementation
    - planning
    - review
    - research
    - artifact-enrichment
  positive_signals:
    - skill
    - cli
    - methodology
    - playbook
  negative_signals:
    - browser agent
    - notebooklm
contract:
  inputs:
    required:
      - name: objective
        type: markdown
      - name: selected_skills
        type: json
    optional:
      - name: result_path
        type: path
      - name: execution_surface
        type: string
      - name: pane_target
        type: string
  outputs:
    required:
      - name: skill_dispatch_result
        type: json
    optional:
      - name: skill_dispatch_prompt
        type: markdown
      - name: skill_dispatch_selection_proof
        type: json
  preconditions:
    - check: input_present
      field: selected_skills
  postconditions:
    - check: output_present
      field: skill_dispatch_result
  invariants:
    - Generic skill execution must reference selected installed skills explicitly and write a prompt artifact before pane dispatch.
composition:
  consumes:
    - type: artifact.dispatch_prompt
  produces:
    - type: artifact.skill_dispatch_result
    - type: artifact.operator_bridge_contract
  compatible_with:
    - resource.repo-workspace
  incompatible_with: []
  requires_after: []
effects:
  read:
    - workspace.repo
  write:
    - artifacts.skill_dispatch
    - artifacts.operator_bridge_contract
  execute:
    - tmux_send_keys
    - skill_dispatch_prompt
  network:
    - tmux_localhost
  cost:
    - local_runtime
  risk:
    - pane_target_mismatch
    - operator_cooldown
bindings:
  skills:
    required: []
    optional: []
  mcp_capabilities: {}
  data_refs:
    - data.objective
    - data.selected_skills
  secret_refs: []
  required_guard_capsules: []
  required_resource_capsules:
    - resource.repo-workspace
runtime_preferences:
  execution_surface: prompt_context_skill
  pane_target: best_effort
  pane_target_selector: builder_idle
verification:
  self_check:
    - check.skill_dispatch_result_written
    - check.skill_dispatch_prompt_written
    - check.skill_dispatch_selection_proof_written
    - check.skill_dispatch_contract_written
    - check.skill_dispatch_command_protocol_declared
    - check.skill_dispatch_workflow_phases_declared
    - check.skill_dispatch_delivery_expectation_declared
  external_verifier:
    required: false
    preferred_capsules:
      - cap.requirement-compiler-verification
  pass_conditions:
    - skill_dispatch_result exists
operator_compatibility:
  preferred:
    - mini-skill-infra-devops-pane-bridge
    - mini-skill-security-review-pane-bridge
    - mini-skill-frontend-ui-pane-bridge
    - mini-skill-agent-building-pane-bridge
    - mini-skill-repo-refactor-pane-bridge
    - mini-skill-frontend-accessibility-pane-bridge
    - mini-skill-api-backend-pane-bridge
    - mini-skill-data-sheet-analysis-pane-bridge
    - mini-skill-github-review-pane-bridge
    - mini-skill-browser-research-pane-bridge
    - mini-skill-agent-orchestration-pane-bridge
    - mini-skill-document-artifact-pane-bridge
    - mini-skill-eval-verification-pane-bridge
    - mini-skill-pdf-cli-pane-bridge
    - mini-skill-research-workflow-pane-bridge
    - mini-skill-planning-workflow-pane-bridge
    - mini-skill-cli-pane-bridge
    - mini-skill-workflow-pane-bridge
    - mini-skill-dispatch-pane-bridge
  forbidden: []
provenance:
  owner: lisihao
  created_at: "2026-05-27T00:00:00Z"
