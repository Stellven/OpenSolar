capability_capsule_id: cap.requirement-research-scout
version: 0.1.0
capsule_kind: capability
metadata:
  name: Requirement Research Scout
  description: Gather sources, ingest artifacts, and prepare evidence inventory for research-mode requirement compilation.
applicability:
  task_types:
    - knowledge-extraction
  positive_signals:
    - research
    - source
    - paper
    - inventory
    - claim
  negative_signals:
    - refactor
contract:
  inputs:
    required:
      - name: requirement_ir
        type: json
    optional:
      - name: source_list
        type: json
  outputs:
    required:
      - name: source_manifest
        type: json
    optional:
      - name: claims_ledger
        type: jsonl
  preconditions:
    - check: task_type_in
      values:
        - knowledge-extraction
  postconditions:
    - check: output_present
      field: source_manifest
  invariants:
    - Every claimed source must remain traceable to input evidence.
composition:
  consumes:
    - type: artifact.requirement_ir
  produces:
    - type: artifact.source_manifest
  compatible_with:
    - guard.secret-leak-guard
    - resource.github-readonly
  incompatible_with: []
  requires_after:
    - cap.requirement-research-synthesizer
effects:
  read:
    - requirement.artifacts
  write:
    - artifacts.research
  execute: []
  network: []
  cost:
    - low_model_quota
  risk:
    - stale_source_inventory
bindings:
  skills:
    required:
      - skill.research-triage
    optional: []
  mcp_capabilities: {}
  data_refs:
    - data.requirement_ir
  secret_refs: []
  required_guard_capsules:
    - guard.secret-leak-guard
  required_resource_capsules:
    - resource.github-readonly
verification:
  self_check:
    - check.source_manifest_written
  external_verifier:
    required: true
    preferred_capsules:
      - cap.requirement-compiler-verification
  pass_conditions:
    - source_manifest exists
operator_compatibility:
  preferred:
    - mini-thunderomlx-qwen36-knowledge
  forbidden:
    - mini-antigravity-gemini35-flash-high
provenance:
  owner: lisihao
  created_at: "2026-05-24T00:00:00Z"
