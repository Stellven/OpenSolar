capability_capsule_id: adapter.artifact-type-bridge
version: 0.1.0
capsule_kind: capability
metadata:
  name: Generic Artifact Type Bridge
  description: Bridge missing artifact types into the shape required by a downstream capability stage.
applicability:
  task_types:
    - planning
    - implementation
    - debugging
    - refactor
    - verification
    - review
    - research
    - evidence
  positive_signals:
    - adapter
    - bridge
    - artifact
  negative_signals: []
contract:
  inputs:
    required:
      - name: upstream_artifact
        type: json
    optional: []
  outputs:
    required:
      - name: bridged_artifact
        type: json
    optional: []
  preconditions:
    - check: task_type_in
      values:
        - planning
        - implementation
        - debugging
        - refactor
        - verification
        - review
        - research
        - evidence
  postconditions:
    - check: output_present
      field: bridged_artifact
  invariants:
    - Adapter output must preserve provenance and declare any lossy transformation.
composition:
  consumes:
    - type: artifact.request_context
  produces:
    - type: artifact.bridged_artifact
  compatible_with: []
  incompatible_with: []
  requires_after: []
effects:
  read:
    - artifacts.bridge_input
  write:
    - artifacts.bridge_output
  execute: []
  network: []
  cost: []
  risk:
    - artifact_translation_loss
bindings:
  skills:
    required: []
    optional: []
  mcp_capabilities: {}
  data_refs: []
  secret_refs: []
  required_guard_capsules: []
  required_resource_capsules: []
verification:
  self_check:
    - check.adapter_output_written
  external_verifier:
    required: false
  pass_conditions:
    - adapter output exists
operator_compatibility:
  preferred: []
  forbidden: []
provenance:
  owner: lisihao
  created_at: "2026-05-25T00:00:00Z"
