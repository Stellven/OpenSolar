capability_capsule_id: cap.chatgpt-browser-agent
version: 0.1.0
capsule_kind: capability
metadata:
  name: ChatGPT Browser Agent
  description: Execute a ChatGPT browser-agent task with explicit project bucketing, structured output expectation, and reusable result artifacts.
applicability:
  task_types:
    - chatgpt-browser-agent
    - research
    - report-writing
  positive_signals:
    - chatgpt
    - browser agent
    - project bucket
    - deep research
  negative_signals:
    - refactor
contract:
  inputs:
    required:
      - name: prompt
        type: markdown
    optional:
      - name: expected_output
        type: string
      - name: model
        type: string
      - name: project_name
        type: string
  outputs:
    required:
      - name: chatgpt_browser_agent_result
        type: json
    optional:
      - name: response_markdown
        type: markdown
  preconditions:
    - check: task_type_in
      values:
        - chatgpt-browser-agent
        - research
        - report-writing
  postconditions:
    - check: output_present
      field: chatgpt_browser_agent_result
  invariants:
    - ChatGPT browser-agent tasks must archive into the configured project bucket.
composition:
  consumes:
    - type: artifact.prompt
  produces:
    - type: artifact.chatgpt_result
  compatible_with:
    - guard.secret-leak-guard
    - resource.repo-workspace
  incompatible_with: []
  requires_after: []
effects:
  read:
    - artifacts.prompt
  write:
    - artifacts.chatgpt
  execute:
    - browser_wrapper
  network:
    - chatgpt.com
  cost:
    - browser_runtime
  risk:
    - auth_expiry
    - browser_quota
bindings:
  skills:
    required:
      - skill.browser-automation
    optional: []
  mcp_capabilities: {}
  data_refs:
    - data.prompt
  secret_refs: []
  required_guard_capsules:
    - guard.secret-leak-guard
  required_resource_capsules:
    - resource.repo-workspace
verification:
  self_check:
    - check.chatgpt_browser_agent_result_written
  external_verifier:
    required: false
    preferred_capsules:
      - cap.requirement-compiler-verification
  pass_conditions:
    - chatgpt_browser_agent_result exists
operator_compatibility:
  preferred:
    - mini-browser-chatgpt
  forbidden: []
provenance:
  owner: lisihao
  created_at: "2026-05-27T00:00:00Z"
