capability_capsule_id: guard.secret-leak-guard
version: 0.1.0
capsule_kind: guard
metadata:
  name: Secret Leak Guard
  description: Fail-closed guard that blocks secret-bearing work without explicit verification coverage.
applicability:
  task_types:
    - planning
    - architecture
    - requirements
    - PERFORMANCE_REGRESSION
    - ROOT_CAUSE_DEBUG
    - CODE_IMPL
    - implementation
    - tests
    - verification
    - review
    - knowledge-extraction
    - research
    - evidence
  positive_signals:
    - secret
    - credential
    - token
  negative_signals: []
contract:
  inputs:
    required: []
    optional: []
  outputs:
    required:
      - name: guard_decision
        type: json
    optional: []
  preconditions:
    - check: task_type_in
      values:
        - PERFORMANCE_REGRESSION
        - ROOT_CAUSE_DEBUG
        - CODE_IMPL
  postconditions:
    - check: output_present
      field: guard_decision
  invariants:
    - Never expose secret-bearing refs without a guard decision.
composition:
  consumes:
    - type: artifact.request_context
  produces:
    - type: artifact.guard_decision
  compatible_with:
    - cap.flashmlx-performance-debugger
  incompatible_with: []
  requires_after: []
effects:
  read:
    - request.metadata
  write:
    - artifacts.guard_decision
  execute: []
  network: []
  cost: []
  risk: []
bindings:
  skills:
    required: []
    optional: []
  mcp_capabilities: {}
  data_refs: []
  secret_refs: []
  required_guard_capsules: []
  required_resource_capsules: []
verification:
  self_check:
    - check.guard_decision_written
  external_verifier:
    required: false
  pass_conditions:
    - guard_decision exists
operator_compatibility:
  preferred:
    - mini-claude-sonnet-builder
  forbidden: []
provenance:
  owner: lisihao
  created_at: "2026-05-24T00:00:00Z"
