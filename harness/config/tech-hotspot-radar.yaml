version: 1
name: Tech Hotspot Radar
description: Unified tech hotspot scanner across YouTube, social media, and GitHub

timezone: America/Toronto
schedule:
  daily:
    hour: 7
    minute: 17
  # social boost for high-tier accounts (optional, not always-on default)
  social_boost:
    enabled: false
    interval_hours: 4
    tier_filter: [tier1]

mac_mini_only: true
allowed_hostnames:
  - lisihaodeMac-mini-3.local
  - lisihaodeMac-mini-3
  - lisihaodeMini-3.local
  - lisihaodeMini-3

output:
  raw_dir: /Users/lisihao/Knowledge/_raw/tech-hotspot-radar
  state_dir: /Users/lisihao/.solar/harness/state/tech-hotspot-radar
  database: /Users/lisihao/.solar/harness/state/tech-hotspot-radar/tech-hotspot-radar.sqlite
  retention_days: 120
  # legacy output dirs preserved
  legacy_raw_dirs:
    youtube: /Users/lisihao/Knowledge/_raw/youtube-influence-digest
    social: /Users/lisihao/Knowledge/_raw/ai-influence-daily-digest
    github: /Users/lisihao/Knowledge/_raw/github-trends-digest

fetch:
  timeout_seconds: 20
  sleep_between_requests_seconds: 3
  min_source_interval_hours: 6
  user_agent: Solar-Tech-Hotspot-Radar/1.0 (+local knowledge capture)
  github_token_env: GITHUB_TOKEN

# ── YouTube source ──────────────────────────────────────────────────
youtube:
  enabled: true
  lookback_hours: 336       # 14 days default
  hot_track_hours: 720      # 30 days for hot videos
  max_videos_per_run: 30
  per_channel_limit: 3
  history_backfill_days: 90       # first historical import window
  incremental_backfill_days: 7    # default window after initial backfill
  backfill_per_channel_limit: 100 # yt-dlp playlist cap per channel
  keep_seen_days: 45
  transcript_max_chars: 60000
  min_transcript_duration_seconds: 600  # do not spend transcript/browser-capture budget on videos under 10 minutes
  phase_report_reasoner:
    provider: browser_agent_chatgpt
    model: chatgpt-5.5
    reasoning_effort: high
    frontdoor: chatgpt
    operator: browser_agent
    chatgpt_project: 杂项
    timeout_seconds: 1200
    max_prompt_chars: 180000
  ai_influence_report_flow:
    enabled: true
    planner:
      provider: browser_agent_chatgpt
      model: chatgpt-5.5
      reasoning_effort: high
      max_catalog_videos: 160
      input_policy: channel_title_summary_time_only
    report_writer:
      provider: browser_agent_chatgpt
      model: chatgpt-5.5
      reasoning_effort: high
      max_prompt_chars: 180000
      require_plan_file: true
      chatgpt_project: 杂项
    notebooklm:
      enabled: true
      notebook_name: ""
      timeout_seconds: 1800
  asr:
    enabled: false
    max_per_run: 0
    backend: mlx-whisper
    whisper_model: mlx-community/whisper-small-mlx
    openai_whisper_model: small
    language: auto
    language_strategy: auto-by-channel
    archive_audio_dir: /Volumes/RAID0-Main/SolarArchive/tech-hotspot-radar/asr-audio
  languages_priority: [en, zh, auto]
