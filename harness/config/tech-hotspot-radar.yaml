# ── GitHub source ──────────────────────────────────────────────────
github:
  enabled: true
  github_token_env: GITHUB_TOKEN
  snapshot_append_only: true
  trend_buckets:
    - agent_runtime
    - agent_skill
    - coding_agent
    - context_engineering
    - inference_compute
    - training_framework
    - infra_os
    - robotics_physical_ai
    - market_signal
  topics:
    - name: ai
      category: ai
      query: "ai OR llm OR agent"
      enabled: true
    - name: large-model
      category: ai
      query: "llm OR transformer OR reasoning"
      enabled: true
    - name: training-framework
      category: training_framework
      query: "training OR finetune OR distributed"
      enabled: true
    - name: compute-framework
      category: compute_framework
      query: "cuda OR triton OR inference OR mlx"
      enabled: true
    - name: agent-skill
      category: agent
      query: "agent OR mcp OR skill"
      enabled: true
    - name: infra-software
      category: infra_os
      query: "os OR db OR compiler OR middleware"
      enabled: true
    - name: context-engineering
      category: agent
      query: "context engineering OR agent memory OR knowledge graph"
      enabled: true
    - name: ai-coding-agent
      category: agent
      query: "claude code OR codex OR coding agent OR mcp"
      enabled: true
    - name: physical-ai-robotics
      category: ai
      query: "robotics OR physical ai OR vla OR embodied ai"
      enabled: true
  tracked_repos:
    - anthropics/claude-plugins-official
    - mattpocock/skills
    - addyosmani/agent-skills
    - colbymchenry/codegraph
    - ChromeDevTools/chrome-devtools-mcp
    - obra/superpowers
    - rohitg00/agentmemory
    - multica-ai/andrej-karpathy-skills
    - TauricResearch/TradingAgents

# ── Research paper source ─────────────────────────────────────────
huggingface_papers:
  enabled: true
  daily_url: https://huggingface.co/papers
  trending_url: https://huggingface.co/papers/trending
  periods: [daily, weekly, monthly]
  timeout_seconds: 30
  user_agent: "Mozilla/5.0 TechHotspotRadar/1.0"
  hot_score_weights:
    star_growth: 0.30
    recent_activity: 0.20
    release_signal: 0.15
    semantic_relevance: 0.15
    social_cross_signal: 0.10
    maintainer_quality: 0.10
  alert_rules:
    tracked_repo_24h_star_growth_pct:
      threshold_pct: 10
      severity: high
    new_release:
      severity: medium
    new_repo_7d_topic_top5:
      severity: high
    tier1_social_mention:
      severity: high
    cross_source_youtube_social:
      severity: critical
    readme_keywords:
      keywords: [mcp, "agent memory", codex, triton, vla]
      severity: medium
    repo_archived_deleted:
      severity: high
