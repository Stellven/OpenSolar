<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Solar Harness — Live Work Panel</title>
<style>
body { font-family: monospace; margin: 16px; background: #1a1a2e; color: #e0e0e0; }
h1 { font-size: 18px; color: #62d0ff; }
.card { border: 1px solid #333; border-radius: 6px; padding: 12px; margin-bottom: 12px; background: #16213e; }
.card h2 { font-size: 14px; margin: 0 0 8px; color: #62d0ff; }
.source-tag { font-size: 11px; color: #666; margin-top: 8px; }
.card-content { min-height: 24px; }
#no-active-work-card .card-content { color: #ffa726; }
#deadlock-alerts-card .card-content { color: #ef5350; }
#events-tail-card .card-content { font-size: 12px; max-height: 200px; overflow-y: auto; }
.event-line { padding: 2px 0; border-bottom: 1px solid #222; }
</style>
</head>
<body>
<h1>Solar Harness — Live Work</h1>

<div id="no-active-work-card" class="card">
  <h2>O1: No Active Work</h2>
  <div class="card-content">unknown</div>
  <div class="source-tag">来源: lib.livework.aggregate_pane_state</div>
</div>

<div id="role-next-step-card" class="card">
  <h2>O5: Role Next Step</h2>
  <div class="card-content">unknown</div>
  <div class="source-tag">来源: lib.livework.resolve_role</div>
</div>

<div id="deadlock-alerts-card" class="card">
  <h2>O2/O3: Deadlock Alerts</h2>
  <div class="card-content">unknown</div>
  <div class="source-tag">来源: lib.livework.detect_deadlock</div>
</div>

<div id="events-tail-card" class="card">
  <h2>Events Tail</h2>
  <div class="card-content">unknown</div>
  <div class="source-tag">来源: events.jsonl</div>
</div>

<script src="/static/livework_panel.js"></script>
</body>
</html>
