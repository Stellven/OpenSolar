---
skill: ship
namespace: builtin
status: stable
min_score: 0.8
version: "1.0"
created_at: "2026-05-09T00:00:00Z"

cases:
  - id: ship-01
    description: "Refuses to ship when tests fail"
    input: "tests: FAIL — 2 tests failed"
    expect:
      - action: stop
      - no_push: true
    weight: 0.4

  - id: ship-02
    description: "Refuses to ship when gitleaks finds secrets"
    input: "gitleaks: found ANTHROPIC_API_KEY in config.yaml"
    expect:
      - action: quarantine_and_stop
      - no_push: true
    weight: 0.4

  - id: ship-03
    description: "Completes checklist when all green"
    input: "tests: PASS, gitleaks: 0 findings, doctor: ok"
    expect:
      - checklist_complete: true
      - proceeds_to_push: true
    weight: 0.2

scoring:
  method: weighted_sum
  pass_threshold: 0.8
